// 持ち駒：先手(大文字)、後手(小文字)
function emptyHand() {
  return {P:0,L:0,N:0,S:0,G:0,B:0,R:0,p:0,l:0,n:0,s:0,g:0,b:0,r:0};
}

// 成り変換
function promoteChar(c) {
  if (c === c.toUpperCase()) {
    // 先手
    const map = {r:"R",b:"B",s:"S",n:"N",l:"L",p:"P"};
    return map[c.toLowerCase()] ? map[c.toLowerCase()].toUpperCase() !== c ? map[c.toLowerCase()] : c : c;
  } else {
    const map = {r:"R",b:"B",s:"S",n:"N",l:"L",p:"P"};
    return map[c] || c;
  }
}
// 先手駒を取ったとき後手の持ち駒に変換
function capturedByGote(c) {
  const base = c.toLowerCase();
  const demote = {R:"r",B:"b",S:"s",N:"n",L:"l",P:"p"};
  return demote[c] || demote[base] || base;
}
function capturedBySente(c) {
  const base = c.toUpperCase();
  const demote = {R:"R",B:"B",S:"S",N:"N",L:"L",P:"P",G:"G"};
  const map = {r:"R",b:"B",s:"S",n:"N",l:"L",p:"P",g:"G",k:"G"};
  return map[c.toLowerCase()] || base;
}
function isSentePiece(c) { return c !== " " && c === c.toUpperCase(); }
function isGotePiece(c) { return c !== " " && c === c.toLowerCase(); }

// =========================================================
// KIFパーサー
// =========================================================
function parseKIF(text) {
  const lines = text.split(/\r?\n/);
  const moves = [];
  for (const line of lines) {
    const m = line.match(/^\s*(\d+)\s+([^\(]+)/);
    if (m) {
      const num = parseInt(m[1]);
      const mv = m[2].trim();
      if (mv !== "投了" && mv !== "中断" && mv !== "千日手" && mv !== "持将棋") {
        moves.push({ num, raw: mv });
      }
    }
  }
  return moves;
}
// CSAパーサー
function parseCSA(text) {
  const lines = text.split(/\r?\n/);
  const moves = [];
  let num = 1;
  for (const line of lines) {
    if (line.startsWith("+") || line.startsWith("-")) {
      const isBlack = line.startsWith("+");
      const coord = line.slice(1,5);
      const piece = line.slice(5).trim();
      const from = coord.slice(0,2);
      const to = coord.slice(2,4);
      moves.push({ num: num++, raw: (isBlack?"▲":"△") + to + piece, from, to, piece, isBlack });
    }
  }
  return moves;
}

let nodeIdCounter = 100;
const genId = () => String(++nodeIdCounter);

const STORAGE_KEY = "nekko_trees_v3";

function loadTrees() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e){}
  return null;
}
function saveTrees(trees) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(trees));
  } catch(e){}

// 将棋盤コンポーネント (拡張版)
// =========================================================
const CELL = 32;
const COLS = 9;
const ROWS = 9;

const STAMP_COLORS = {maru:"#2471A3",ya:"#6B3FA0",hoshi:"#B7950B",tri:"#A93226",q:"#5F5E5A"};
const STAMP_CHARS = {maru:"○",ya:"→",hoshi:"★",tri:"△",q:"？"};

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// 持ち駒の表示名（先手/後手）
const HAND_PIECES_SENTE = ["R","B","G","S","N","L","P"];
const HAND_PIECES_GOTE  = ["r","b","g","s","n","l","p"];
const HAND_PIECE_NAMES  = {R:"飛",B:"角",G:"金",S:"銀",N:"桂",L:"香",P:"歩",r:"飛",b:"角",g:"金",s:"銀",n:"桂",l:"香",p:"歩"};

function ShogiBoard({board, stamps=[], hand, onChange, readOnly=false}) {
  const canvasRef = React.useRef(null);
  const [boardState, setBoardState] = React.useState(() => board ? JSON.parse(JSON.stringify(board)) : null);
  const [stampList, setStampList] = React.useState(stamps);
  const [handState, setHandState] = React.useState(() => hand ? {...hand} : emptyHand());
  const [selected, setSelected] = React.useState(null); // {row,col} or {hand:piece}
  const [mode, setMode] = React.useState("move");
  const [stampType, setStampType] = React.useState("maru");
  const [promoteDialog, setPromoteDialog] = React.useState(null); // {from,to,piece}
  const [kifu, setKifu] = React.useState([]);
  const [showKifu, setShowKifu] = React.useState(false);
  const [importText, setImportText] = React.useState("");
  const [showImport, setShowImport] = React.useState(false);
  const [turn, setTurn] = React.useState("sente"); // sente or gote

  React.useEffect(()=>{ if(board) setBoardState(JSON.parse(JSON.stringify(board))); },[board]);
  React.useEffect(()=>{ setStampList(stamps); },[stamps]);
  React.useEffect(()=>{ if(hand) setHandState({...hand}); },[hand]);

  const draw = React.useCallback(()=>{
    const canvas = canvasRef.current;
    if (!canvas || !boardState) return;
    const ctx = canvas.getContext("2d");
    const W = COLS*CELL, H = ROWS*CELL;
    ctx.clearRect(0,0,W,H);
    // 盤
    ctx.fillStyle = "#c8a447";
    ctx.fillRect(0,0,W,H);
    // グリッド
    ctx.strokeStyle = "rgba(26,15,0,0.55)";
    ctx.lineWidth = 0.8;
    for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,H);ctx.stroke();}
    for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(W,y*CELL);ctx.stroke();}
    // 座標ラベル（将棋記法）
    ctx.font = `${CELL*0.22}px 'Noto Serif JP',serif`;
    ctx.fillStyle = "rgba(26,15,0,0.5)";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for(let c=0;c<9;c++){
      ctx.fillText(FILES[c], c*CELL+CELL/2, -8);
    }
    for(let r=0;r<9;r++){
      ctx.fillText(RANKS[r], W+8, r*CELL+CELL/2);
    }
    // 選択マス
    if(selected && selected.row !== undefined){
      ctx.fillStyle = "rgba(255,220,80,0.45)";
      ctx.fillRect(selected.col*CELL, selected.row*CELL, CELL, CELL);
    }
    // 駒
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const piece = boardState[r][c];
        if(!piece||piece===" ") continue;
        const cx = c*CELL+CELL/2, cy = r*CELL+CELL/2;
        const isGote = isGotePiece(piece);
        const pw=CELL*0.72, ph=CELL*0.78;
        ctx.save();
        if(isGote){ctx.translate(cx,cy);ctx.rotate(Math.PI);ctx.translate(-cx,-cy);}
        ctx.fillStyle = "#faf4e8";
        roundRect(ctx,cx-pw/2,cy-ph/2,pw,ph,3);
        ctx.fill();
        ctx.strokeStyle="rgba(26,15,0,0.3)";ctx.lineWidth=0.5;ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.font=`${CELL*0.38}px 'Noto Serif JP',serif`;
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillStyle = isGote ? "#7B3010" : "#1a0f00";
        if(isGote){
          ctx.translate(cx,cy);ctx.rotate(Math.PI);
          ctx.fillText(PIECE_NAMES[piece]||piece,0,0);
        } else {
          ctx.fillText(PIECE_NAMES[piece]||piece,cx,cy);
        }
        ctx.restore();
      }
    }
    // スタンプ
    for(const s of stampList){
      const sx=s.col*CELL+CELL/2, sy=s.row*CELL+CELL/2;
      ctx.save();
      ctx.font=`bold ${CELL*0.52}px 'Noto Serif JP',serif`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle=STAMP_COLORS[s.type];ctx.globalAlpha=0.88;
      ctx.fillText(STAMP_CHARS[s.type],sx,sy);
      ctx.restore();
    }
  }, [boardState, stampList, selected]);

  React.useEffect(()=>{ draw(); },[draw]);

  const handleCanvasClick = React.useCallback((e)=>{
    if(readOnly||!boardState) return;
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width;
    const scaleY = canvas.height/rect.height;
    const col = Math.floor((e.clientX-rect.left)*scaleX/CELL);
    const row = Math.floor((e.clientY-rect.top)*scaleY/CELL);
    if(col<0||col>=COLS||row<0||row>=ROWS) return;

    if(mode==="stamp"){
      const newStamps = stampList.filter(s=>!(s.row===row&&s.col===col));
      newStamps.push({row,col,type:stampType});
      setStampList(newStamps);
      onChange&&onChange({board:boardState,stamps:newStamps,hand:handState});
      return;
    }
    if(mode==="erase"){
      const newStamps = stampList.filter(s=>!(s.row===row&&s.col===col));
      setStampList(newStamps);
      onChange&&onChange({board:boardState,stamps:newStamps,hand:handState});
      return;
    }
    // moveモード
    if(selected && selected.hand){
      // 持ち駒を打つ
      const piece = selected.hand;
      if(boardState[row][col]===" "){
        const newBoard = boardState.map(r=>[...r]);
        newBoard[row][col] = piece;
        const newHand = {...handState};
        newHand[piece] = Math.max(0,(newHand[piece]||0)-1);
        setBoardState(newBoard);
        setHandState(newHand);
        // 棋譜記録
        const coordStr = toKifCoord(row,col);
        const sente = isSentePiece(piece);
        const mark = sente ? "▲" : "△";
        const newKifu = [...kifu, `${kifu.length+1}手目 ${mark}${coordStr}${PIECE_NAMES[piece]||piece}打`];
        setKifu(newKifu);
        setSelected(null);
        setTurn(turn==="sente"?"gote":"sente");
        onChange&&onChange({board:newBoard,stamps:stampList,hand:newHand,kifu:newKifu});
      }
      return;
    }
    if(selected && selected.row !== undefined){
      // 移動先を選択
      const from = selected;
      if(from.row===row && from.col===col){setSelected(null);return;}
      const piece = boardState[from.row][from.col];
      if(!piece||piece===" "){setSelected(null);return;}
      // 取る処理
      const target = boardState[row][col];
      const newBoard = boardState.map(r=>[...r]);
      const newHand = {...handState};
      if(target && target!==" "){
        // 取った駒を持ち駒に
        if(isSentePiece(piece)){
          // 先手が取る→先手の持ち駒
          const cap = capturedBySente(target);
          newHand[cap] = (newHand[cap]||0)+1;
        } else {
          // 後手が取る→後手の持ち駒
          const cap = capturedByGote(target);
          newHand[cap] = (newHand[cap]||0)+1;
        }
      }
      // 成り判定
      const coordStr = toKifCoord(row,col);
      const fromCoord = toKifCoord(from.row, from.col);
      const sente = isSentePiece(piece);
      const inPromZone = sente ? row<=2 : row>=6;
      const wasInPromZone = sente ? from.row<=2 : from.row>=6;
      const canProm = CAN_PROMOTE[piece.toLowerCase()] && (inPromZone||wasInPromZone) && piece===piece.toLowerCase() ? !sente : CAN_PROMOTE[piece.toLowerCase()] && (inPromZone||wasInPromZone) && piece===piece.toUpperCase() ? false : false;
      const lowerP = piece.toLowerCase();
      const canPromote = CAN_PROMOTE[lowerP] && (inPromZone || wasInPromZone);
      // 成れる場合はダイアログ表示
      if(canPromote && piece!==piece && false){} // placeholder
      if(canPromote){
        setPromoteDialog({from,to:{row,col},piece,newBoard,newHand,coordStr,fromCoord,sente});
        newBoard[row][col]=piece;
        newBoard[from.row][from.col]=" ";
        setBoardState(newBoard);
        setHandState(newHand);
        setSelected(null);
      } else {
        newBoard[row][col]=piece;
        newBoard[from.row][from.col]=" ";
        const mark = sente?"▲":"△";
        const newKifu=[...kifu,`${kifu.length+1}手目 ${mark}${coordStr}${PIECE_NAMES[piece]||piece}(${fromCoord})`];
        setKifu(newKifu);
        setBoardState(newBoard);
        setHandState(newHand);
        setSelected(null);
        setTurn(turn==="sente"?"gote":"sente");
        onChange&&onChange({board:newBoard,stamps:stampList,hand:newHand,kifu:newKifu});
      }
    } else {
      // 駒を選択
      const piece = boardState[row][col];
      if(piece&&piece!==" ") setSelected({row,col});
    }
  },[boardState,stampList,handState,selected,mode,stampType,kifu,turn,readOnly,onChange]);

  function handlePromote(doPromote){
    if(!promoteDialog) return;
    const {from,to,piece,newBoard,newHand,coordStr,fromCoord,sente} = promoteDialog;
    const finalPiece = doPromote ? (sente ? piece.toUpperCase() : piece.toLowerCase())
      // 成り後
      : piece;
    // 成り変換
    let promoted = piece;
    if(doPromote){
      if(sente){
        const pm = {r:"R",b:"B",s:"S",n:"N",l:"L",p:"P"};
        promoted = pm[piece.toLowerCase()] || piece;
      } else {
        const pm = {r:"R",b:"B",s:"S",n:"N",l:"L",p:"P"};
        promoted = pm[piece] || piece;
      }
    }
    newBoard[to.row][to.col] = promoted;
    const mark = sente?"▲":"△";
    const promStr = doPromote ? "成" : "不成";
    const newKifu=[...kifu,`${kifu.length+1}手目 ${mark}${coordStr}${PIECE_NAMES[promoted]||promoted}(${fromCoord})${doPromote?"成":""}`];
    setKifu(newKifu);
    setBoardState([...newBoard]);
    setHandState({...newHand});
    setTurn(turn==="sente"?"gote":"sente");
    setPromoteDialog(null);
    onChange&&onChange({board:newBoard,stamps:stampList,hand:newHand,kifu:newKifu});
  }

  function handleHandClick(piece){
    if(readOnly) return;
    const count = handState[piece]||0;
    if(count>0) setSelected({hand:piece});
  }

  function handleImport(){
    const text = importText.trim();
    if(!text) return;
    let moves;
    if(text.includes("+") || text.includes("-")){
      moves = parseCSA(text);
    } else {
      moves = parseKIF(text);
    }
    const formatted = moves.map(m=>m.raw).join("\n");
    setKifu(formatted.split("\n"));
    setShowImport(false);
    setImportText("");
  }

  if(!boardState) return null;
  const W=COLS*CELL, H=ROWS*CELL;

  // 持ち駒表示
  const sentePieces = HAND_PIECES_SENTE.filter(p=>(handState[p]||0)>0);
  const gotePieces  = HAND_PIECES_GOTE.filter(p=>(handState[p]||0)>0);

  return React.createElement("div", null,
    // ツールバー
    !readOnly && React.createElement("div", {style:{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}},
      [["move","動かす","ti-arrows-move"],["stamp","スタンプ","ti-stamp"],["erase","消す","ti-eraser"]].map(([m,label,icon])=>
        React.createElement("button", {key:m, onClick:()=>setMode(m),
          style:{display:"flex",alignItems:"center",gap:4,padding:"4px 9px",borderRadius:8,
            fontSize:11,cursor:"pointer",border:"0.5px solid",fontFamily:"'Noto Serif JP',serif",
            borderColor:mode===m?"#a07840":"rgba(26,15,0,0.18)",
            background:mode===m?"#f0e8d4":"#faf4e8",
            color:mode===m?"#1a0f00":"rgba(26,15,0,0.5)"}},
          React.createElement("i",{className:`ti ${icon}`,style:{fontSize:13}}), label)
      ),
      React.createElement("button",{onClick:()=>setShowKifu(v=>!v),
        style:{display:"flex",alignItems:"center",gap:4,padding:"4px 9px",borderRadius:8,
          fontSize:11,cursor:"pointer",border:"0.5px solid",
          borderColor:showKifu?"#a07840":"rgba(26,15,0,0.18)",
          background:showKifu?"#f0e8d4":"#faf4e8",
          color:showKifu?"#1a0f00":"rgba(26,15,0,0.5)"},
        },
        React.createElement("i",{className:"ti ti-list",style:{fontSize:13}}),"棋譜"
      ),
      React.createElement("button",{onClick:()=>setShowImport(v=>!v),
        style:{display:"flex",alignItems:"center",gap:4,padding:"4px 9px",borderRadius:8,
          fontSize:11,cursor:"pointer",border:"0.5px solid",
          borderColor:showImport?"#a07840":"rgba(26,15,0,0.18)",
          background:showImport?"#f0e8d4":"#faf4e8",
          color:showImport?"#1a0f00":"rgba(26,15,0,0.5)"},
        },
        React.createElement("i",{className:"ti ti-upload",style:{fontSize:13}}),"KIF/CSA"
      )
    ),
    // スタンプ選択
    !readOnly && mode==="stamp" && React.createElement("div",{style:{display:"flex",gap:5,marginBottom:6,alignItems:"center",flexWrap:"wrap"}},
      React.createElement("span",{style:{fontSize:10,color:"rgba(26,15,0,0.5)"}},"スタンプ："),
      Object.entries(STAMP_CHARS).map(([t,ch])=>
        React.createElement("div",{key:t,onClick:()=>setStampType(t),
          style:{width:28,height:28,borderRadius:"50%",cursor:"pointer",display:"flex",
            alignItems:"center",justifyContent:"center",fontSize:14,color:STAMP_COLORS[t],
            background:"#faf4e8",
            border:stampType===t?`1.5px solid ${STAMP_COLORS[t]}`:"1.5px solid transparent"}},

      background:"#f0e8d4",borderRadius:"6px 6px 0 0",minHeight:28,marginBottom:1}},
      React.createElement("span",{style:{fontSize:10,color:"#7B3010",fontWeight:600,minWidth:32}},"後手△"),
      gotePieces.length===0
        ? React.createElement("span",{style:{fontSize:10,color:"rgba(26,15,0,0.3)"}}, "なし")
        : gotePieces.map(p=>
            React.createElement("div",{key:p,onClick:()=>handleHandClick(p),
              style:{display:"flex",alignItems:"center",gap:2,padding:"2px 6px",
                borderRadius:6,background:selected&&selected.hand===p?"#c8a447":"#faf4e8",

// ツリーマップ
// =========================================================
const NODE_W=110, NODE_H=38;
const NODE_COLORS = {
  done:{fill:"#EAF3DE",stroke:"#3B6D11",text:"#27500A"},
  wip:{fill:"#fadbd8",stroke:"#7B3010",text:"#7B3010"},
  todo:{fill:"#F1EFE8",stroke:"#B4B2A9",text:"#5F5E5A",dashed:true}
};
const EDGE_COLORS = {自分の選択:"#1a5276",相手の戦法:"#7B3010",自分の志向:"#1a5276",局面の状況:"#854F0B"};

function layoutTree(nodes, rootId) {
  const pos={},edges=[];
  let leafIdx=0;
  function calcPos(id, depth) {
    const n=nodes[id];
    if(!n) return 0;
    const children=(n.childIds||[]).filter(c=>nodes[c]);
    if(children.length===0){
      pos[id]={x:depth*(NODE_W+40),y:leafIdx*(NODE_H+22)};
      leafIdx++;return 1;
    }
    const start=leafIdx;
    children.forEach(c=>calcPos(c,depth+1));
    const end=leafIdx-1;
    pos[id]={x:depth*(NODE_W+40),y:(start+end)/2*(NODE_H+22)};
    return end-start+1;
  }
  calcPos(rootId,0);
  function addEdges(id) {
    const n=nodes[id];
    if(!n)return;
    (n.childIds||[]).forEach(cid=>{
      const c=nodes[cid];
      if(!c)return;
      const from=pos[id],to=pos[cid];
      const color=EDGE_COLORS[c.approachType]||"#7B3010";
      edges.push({from:id,to:cid,x1:from.x+NODE_W,y1:from.y+NODE_H/2,
        x2:to.x,y2:to.y+NODE_H/2,color});
      addEdges(cid);
    });
  }
  addEdges(rootId);
  return {pos,edges};
}

function NodeDetail({tree, nodeId, onBack, onNodeSelect, onNewNode, onUpdate, onDeleteNode}) {
  const node = tree.nodes[nodeId];
  const [memo,setMemo]=React.useState((node&&node.memo)||"");
  const [status,setStatus]=React.useState((node&&node.status)||"todo");
  const [boardVisible,setBoardVisible]=React.useState(!!(node&&node.board));
  const [boardData,setBoardData]=React.useState((node&&node.board)||null);
  const [handData,setHandData]=React.useState((node&&node.hand)||emptyHand());
  const [stamps,setStamps]=React.useState((node&&node.stamps)||[]);
  const [showDeleteConfirm,setShowDeleteConfirm]=React.useState(false);

  if(!node) return null;
  const parent = node.parentId?tree.nodes[node.parentId]:null;
  const children = (node.childIds||[]).map(id=>tree.nodes[id]).filter(Boolean);
  const breadcrumb=(()=>{const a=[];let x=node;while(x.parentId){x=tree.nodes[x.parentId];x&&a.unshift(x.label);}return a.join(" › ");})();

  const handleBoardChange=({board,stamps:s,hand})=>{
    setBoardData(board);setHandData(hand||emptyHand());setStamps(s||[]);
  };
  const toggleBoard=()=>{
    if(!boardVisible&&!boardData){
      const base=(parent&&parent.board)||null;
      setBoardData(JSON.parse(JSON.stringify(base||INIT_BOARD)));
      setHandData(emptyHand());
    }
    setBoardVisible(v=>!v);
  };
  const handleSave=()=>{
    onUpdate&&onUpdate(nodeId,{memo,status,
      board:boardVisible?boardData:null,
      stamps:boardVisible?stamps:[],
      hand:boardVisible?handData:null});
  };

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",height:"100%",
    background:"#faf4e8"}},

// =========================================================
// ルートコンポーネント
// =========================================================
function App() {
  const [trees, setTrees] = React.useState(()=>loadTrees()||INIT_TREES);
  const [screen, setScreen] = React.useState("list"); // list|map|node|new|public
  const [activeTreeId, setActiveTreeId] = React.useState(null);
  const [activeNodeId, setActiveNodeId] = React.useState(null);
  const [newParentId, setNewParentId] = React.useState(null);

  // 自動保存
  React.useEffect(()=>{ saveTrees(trees); },[trees]);

  const activeTree = trees.find(t=>t.id===activeTreeId);

  function openTree(id) { setActiveTreeId(id); setScreen("map"); }
  function openNode(id) {
    if(id==="new"){ setNewParentId("root"); setScreen("new"); return; }
    setActiveNodeId(id); setScreen("node");
  }
  function openNewNode(parentId) { setNewParentId(parentId); setScreen("new"); }

  function updateNode(nodeId, data) {
    setTrees(prev=>prev.map(t=>{
      if(t.id!==activeTreeId)return t;
      return {...t,nodes:{...t.nodes,[nodeId]:{...t.nodes[nodeId],...data}}};
    }));
  }

  function addNode(newNode) {
    setTrees(prev=>prev.map(t=>{
      if(t.id!==activeTreeId)return t;
      const parent = t.nodes[newNode.parentId];
      const updatedParent = {...parent, childIds:[...(parent.childIds||[]),newNode.id]};
      return {...t,nodes:{...t.nodes,[newNode.parentId]:updatedParent,[newNode.id]:newNode}};
    }));
  }

  function deleteNode(nodeId) {
    setTrees(prev=>prev.map(t=>{
      if(t.id!==activeTreeId)return t;
      // 子孫を再帰的に収集
      const toDelete=new Set();
      function collect(id){
        toDelete.add(id);
        const n=t.nodes[id];
        if(n&&n.childIds) n.childIds.forEach(collect);
      }
      collect(nodeId);
      // 親の childIds から除去
      const node=t.nodes[nodeId];
      const newNodes={...t.nodes};
      if(node&&node.parentId&&newNodes[node.parentId]){
        const p=newNodes[node.parentId];
        newNodes[node.parentId]={...p,childIds:(p.childIds||[]).filter(id=>id!==nodeId)};
      }
      toDelete.forEach(id=>delete newNodes[id]);
      return {...t,nodes:newNodes};
    }));
    setScreen("map");
  }

  function newTree() {
    const id="t"+Date.now();
    const newT={id,name:"新しいツリー",active:false,public:false,tags:[],likedBy:0,
      nodes:{root:{id:"root",label:"新しいツリー",status:"todo",isRoot:true,parentId:null,
        board:null,memo:"",stamps:[],childIds:[],hand:null,kifu:[]}}};
    setTrees(prev=>[...prev,newT]);
    setActiveTreeId(id);setScreen("map");
  }

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",
    minHeight:"100vh",padding:"40px 20px 60px",background:"#0d0800",
    fontFamily:"'Noto Serif JP',serif"}},
    React.createElement("div",{style:{textAlign:"center",marginBottom:24}},
      React.createElement("h1",{style:{fontFamily:"'Shippori Mincho B1',serif",fontSize:20,
        color:"#e8d4a8",letterSpacing:"0.4em",marginBottom:3}},
        "ね",React.createElement("span",{style:{color:"#c8a96e"}},"っ"),"こ"),
      React.createElement("p",{style:{fontSize:10,color:"rgba(200,169,110,0.35)",letterSpacing:"0.2em"}},
        "将棋研究ノート v2")
    ),
    React.createElement("div",{style:{width:320,background:"#faf4e8",borderRadius:38,
      overflow:"hidden",border:"1.5px solid rgba(200,169,110,0.3)",
      boxShadow:"0 40px 80px rgba(0,0,0,0.8)",height:620,display:"flex",
      flexDirection:"column"}},
      screen==="list"&&React.createElement(TreeList,{trees,onOpen:openTree,
        onPublic:()=>setScreen("public"),onNewTree:newTree}),
      screen==="map"&&activeTree&&React.createElement(TreeMap,{tree:activeTree,
        onNodeSelect:openNode,onBack:()=>setScreen("list")}),
      screen==="node"&&activeTree&&activeNodeId&&React.createElement(NodeDetail,{
        tree:activeTree,nodeId:activeNodeId,
        onBack:()=>setScreen("map"),
        onNodeSelect:openNode,
        onNewNode:openNewNode,
        onUpdate:updateNode,
        onDeleteNode:deleteNode}),
      screen==="new"&&activeTree&&newParentId&&React.createElement(NewNodeWizard,{
        tree:activeTree,parentNodeId:newParentId,
        onComplete:node=>{addNode(node);setScreen("map");},
        onCancel:()=>setScreen(activeNodeId?"node":"map")}),
      screen==="public"&&React.createElement(PublicTrees,{onBack:()=>setScreen("list")})
    ),
    // ナビゲーション
    React.createElement("div",{style:{display:"flex",gap:6,marginTop:20}},
      [{s:"list",icon:"ti-layout-list",label:"一覧"},
       {s:"map",icon:"ti-git-branch",label:"ツリー"},
       {s:"node",icon:"ti-chess",label:"ノード"},
       {s:"public",icon:"ti-world",label:"みんな"}
      ].map(x=>React.createElement("div",{key:x.s,
        onClick:()=>{
          if(x.s==="map"&&!activeTreeId)return;
          if(x.s==="node"&&!activeNodeId)return;
          setScreen(x.s);
        },
        style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3,
          padding:"6px 10px",borderRadius:10,cursor:"pointer",
          background:screen===x.s?"rgba(200,169,110,0.15)":"transparent",
          border:screen===x.s?"0.5px solid rgba(200,169,110,0.3)":"0.5px solid transparent",
          transition:"all 0.15s"}},
        React.createElement("i",{className:`ti ${x.icon}`,style:{fontSize:16,
          color:screen===x.s?"#c8a96e":"rgba(200,169,110,0.35)"}}),
        React.createElement("span",{style:{fontSize:9,letterSpacing:"0.05em",
          color:screen===x.s?"#c8a96e":"rgba(200,169,110,0.35)"}},x.label)
      ))
    )
  );
}
